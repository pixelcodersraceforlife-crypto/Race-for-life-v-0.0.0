<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu com Video Background</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        @import url(https://fonts.googleapis.com/css?family=Kite+One);
        @import url(https://fonts.googleapis.com/css?family=Offside);

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Evita scrolls desnecessários por causa do vídeo */
        }

        body {
            background: #0D6050; /* Fallback caso o vídeo não carregue */
            font: normal 1.1em Calibri;
        }

        /* --- Estilo do Vídeo de Fundo --- */
        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1000; /* Garante que fique atrás de tudo */
            object-fit: cover; /* Faz o vídeo cobrir a tela sem distorcer */
            filter: brightness(0.5); /* Opcional: escurece o vídeo para ler melhor o menu */
        }

        /* --- Seu CSS Original --- */
        nav {
            height: 25%;
            width: 30%;
            position: absolute;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%);
            font: normal 1.2em Offside;
        }

        p { margin: 5px 0; }
        li a { display: block; }
        a { text-decoration: none; color: #eee; transition: all linear .3s; }

        a:hover {
            color: #ecbb15;
            position: relative;
            cursor: pointer;
            text-shadow: rgb(172, 136, 15) 0px 1px 0px,
                         rgb(108, 86, 10) 0px 2px 0px,
                         rgba(0, 0, 0, 0.199219) 0px 3px 1px,
                         rgba(0, 0, 0, 0.296875) 0px 4px 2px;
            transition: all linear .3s;
        }

        li a:after {
            content: attr(data-title);
            padding: 4px 8px;
            line-height: 100%;
            color: #fff;
            position: absolute;
            left: 40%;
            top: 70%;
            white-space: nowrap;
            z-index: 20px;
            font-size: .7em;
            background: rgba(10, 50, 70, 0.75);
            opacity: 0;
            text-shadow: none;
        }

        li a:hover:after {
            opacity: 1;
            transition: all linear .5s .2s;
        }

        ul { list-style-type: none; padding: 0; margin: 0; }
        li { width: 100%; text-align: center; line-height: 2.5em; float: left; }

        li:first-child {
            line-height: 60px;
            font-size: 1.5em;
            text-shadow: rgb(187, 187, 187) 0px 1px 0px,
                         rgb(181, 181, 181) 0px 2px 0px,
                         rgba(0, 0, 0, 0.199219) 0px 3px 1px,
                         rgba(0, 0, 0, 0.296875) 0px 4px 3px;
        }

        li:first-child a:hover { -webkit-animation: anim infinite 1.5s; }

        @-webkit-keyframes anim {
            0% { -webkit-transform: rotate(4deg); }
            50% { -webkit-transform: rotate(-4deg); }
            100% { -webkit-transform: rotate(4deg); }
        }

        section {
            width: 400px;
            background: #222;
            color: #fff;
            position: absolute;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) scale(0.6);
            opacity: 0;
            z-index: -1;
            transition: all .3s ease-in;
            box-shadow: 0 0 20px #000;
            font: normal 1em 'Kite One';
        }

        header {
            height: 32px;
            padding: 0 8px;
            line-height: 32px;
            color: #000;
            background: #17AC90;
            font-weight: bold;
            font-size: .9em;
        }

        section > div { padding: 10px 4px; text-align: center; }

        .close:after {
            content: "X";
            color: #fff;
            height: 32px;
            width: 32px;
            line-height: 32px;
            text-align: center;
            background: #D63623;
            position: absolute;
            top: 0;
            right: 0;
            transition: all .2s linear;
            font-family: Arial;
        }

        .close:hover { cursor: pointer; }
        .close:hover:after { background: #FF311A; transition: all .2s linear; }

        .active {
            -webkit-transform: translate(-50%, -50%) scale(1);
            transition: all .3s ease-out;
            opacity: 1;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-background">
        <source src="./assets/background.mp4" type="video/mp4">
        Seu navegador não suporta vídeos em HTML5.
    </video>

    <nav>
        <ul>
            <li><a href="index.html" data-title="Comece a aventura!" id="jogar-btn">JOGAR!</a></li>
            <li><a data-title="Configure o jogo" id="op-btn">OPÇÕES</a></li>
            <li><a data-title="Conheça as pessoas por trás do jogo" id="credits-btn">CRÉDITOS</a></li>
        </ul>
    </nav>

    <section id="login">
        <header>
            Login
            <div class="close"></div>
        </header>
        <div>
            <p>Digite o seu nome de usuário e senha:</p>
            <input type="text" name="nick" id="nick" placeholder="Nick"/><br/>
            <input type="password" name="senha" id="senha" placeholder="Senha"/><br/>
            <p>Ou registre-se <a href="">aqui</a></p>
        </div>
    </section>

    <section id="opcoes">
        <header>
            Opções
            <div class="close"></div>
        </header>
        <div>
            <p>Ajuste suas configurações aqui.</p>
        </div>
    </section>

    <section id="creditos">
        <header>
            Créditos
            <div class="close"></div>
        </header>
        <div>
            <p>creditos</p>
        </div>
    </section>

    <script>
        $(document).ready(function(){
            // $("#jogar-btn").click(function(event){
            //     $("#login").addClass("active");
            // });
            $("#op-btn").click(function(event){
                $("#opcoes").addClass("active");
            });
            $("#creditos-btn").click(function(){
                $("#creditos").addClass("active");
            });
            $(".close").click(function() {
                $(this).parent().parent().removeClass("active");
            });
        });
    </script>
</body>
</html>
